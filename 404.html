<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Redirecting...</title>
        <script>
            // Redirects unknown paths back into index.html for BrowserRouter on GitHub Pages.
            var pathSegmentsToKeep = 1;
            var locationRef = window.location;
            locationRef.replace(
                locationRef.protocol +
                    "//" +
                    locationRef.hostname +
                    (locationRef.port ? ":" + locationRef.port : "") +
                    locationRef.pathname
                        .split("/")
                        .slice(0, 1 + pathSegmentsToKeep)
                        .join("/") +
                    "/?/" +
                    locationRef.pathname
                        .slice(1)
                        .split("/")
                        .slice(pathSegmentsToKeep)
                        .join("/")
                        .replace(/&/g, "~and~") +
                    (locationRef.search
                        ? "&" + locationRef.search.slice(1).replace(/&/g, "~and~")
                        : "") +
                    locationRef.hash
            );
        </script>
    </head>
    <body></body>
</html>
