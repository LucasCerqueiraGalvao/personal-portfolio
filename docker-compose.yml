services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: personal-portfolio-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - personal_portfolio_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0 --port 5173

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: personal-portfolio-prod
    ports:
      - "8080:80"

volumes:
  personal_portfolio_node_modules:
