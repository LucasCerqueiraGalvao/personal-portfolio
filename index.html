<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="%BASE_URL%lc.ico" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lucas Cerqueira Galvao</title>
        <script>
            // Handles GitHub Pages SPA redirect from 404.html
            (function (location) {
                if (!location.search || location.search[1] !== "/") return;
                var decoded = location.search
                    .slice(1)
                    .split("&")
                    .map(function (value) {
                        return value.replace(/~and~/g, "&");
                    })
                    .join("?");
                window.history.replaceState(
                    null,
                    "",
                    location.pathname.slice(0, -1) + decoded + location.hash
                );
            })(window.location);
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
